name: leha_bald_client
description: Flutter Flame client for Leha Bald.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.23.0
  web_socket_channel: ^3.0.1
  dart_mappable: ^4.3.0
  shared_preferences: ^2.3.2
  web: ^1.1.1
  leha_bald_shared:
    path: ../packages/shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  dart_mappable_builder: ^4.3.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # Whole directory: existing heads/logo plus optional sasha-head.png and
    # barrel.png are auto-bundled once dropped in (no pubspec edit needed).
    - assets/images/

name: Deploy on tag

# Триггерится, когда в репозиторий пушится тег вида vX.Y.Z (например v1.0.0).
# Тег можно повесить на любой коммит: git tag v1.0.0 <hash> && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

# Не запускать два деплоя одновременно.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # полная история + теги — нужно для changelog

      - name: Build release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          # 1) если тег аннотированный (git tag -a ... -m "...") — берём его текст
          TAGMSG=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' | sed '/^-----BEGIN/,$d')
          if [ -n "$(echo "$TAGMSG" | tr -d '[:space:]')" ]; then
            NOTES="$TAGMSG"
          elif [ -n "$PREV" ]; then
            # 2) иначе — список коммитов с прошлого релиза
            NOTES=$(git log --no-merges --pretty=format:'• %s' "$PREV..$TAG")
          else
            NOTES=$(git log --no-merges --pretty=format:'• %s' "$TAG")
          fi
          [ -z "$NOTES" ] && NOTES="(без изменений)"
          {
            echo "notes<<__EOF__"
            echo "$NOTES"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t lehabald:latest .

      - name: Save image to file
        run: docker save lehabald:latest | gzip > image.tar.gz

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload image to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: scp -i ~/.ssh/id_rsa image.tar.gz "$SSH_USER@$SSH_HOST:~/image.tar.gz"

      - name: Load image and restart container
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" '
            set -e
            sudo docker load -i ~/image.tar.gz
            sudo docker rm -f lehabald 2>/dev/null || true
            sudo docker run -d --name lehabald --restart unless-stopped -p 4173:4173 lehabald:latest
            sudo docker image prune -f
            rm -f ~/image.tar.gz
          '

      - name: Notify Telegram (success)
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          printf '%s\n' \
            "🚀 Lehabald $TAG задеплоен" \
            "" \
            "📋 Что нового:" \
            "$NOTES" \
            "" \
            "🎮 Играть: http://37.230.168.117:4173" > msg.txt
          curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT_ID" \
            --data-urlencode "message_thread_id=$TG_THREAD_ID" \
            --data-urlencode "text@msg.txt" >/dev/null

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        run: |
          curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT_ID" \
            --data-urlencode "message_thread_id=$TG_THREAD_ID" \
            --data-urlencode "text=❌ Деплой ${{ github.ref_name }} упал. Логи: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >/dev/null
